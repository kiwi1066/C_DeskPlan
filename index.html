<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desk Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1 id="appTitle">Desk Planner</h1>
  </header>

  <div id="controls">

    <!-- Location row: Building + Floor -->
    <div class="view-row" id="locationRow">
      <div class="field-group">
        <span class="field-label">Building</span>
        <select id="building"></select>
      </div>
      <div class="field-group">
        <span class="field-label">Floor</span>
        <select id="floor"></select>
      </div>
    </div>

    <!-- View row: Mode + Day -->
    <div class="view-row">
      <div class="field-group">
        <span class="field-label">Mode</span>
        <select id="mode">
          <option value="single">Single</option>
          <option value="compare">Compare</option>
        </select>
      </div>
      <div class="field-group">
        <span class="field-label">Day</span>
        <select id="day"></select>
      </div>
      <div id="compareControls" class="field-group">
        <span class="field-label">vs</span>
        <select id="day2"></select>
      </div>
    </div>

    <div id="editControls">
      <div class="toolbar-section">
        <span class="toolbar-label">File</span>
        <button id="btn-add-team">➕ Add Team</button>
        <button id="btn-import">📂 Import</button>

        <!-- Export submenu -->
        <div class="submenu-wrap" id="exportSubmenuWrap">
          <button id="btn-export" class="submenu-trigger">⬇ Export ▾</button>
          <div class="submenu" id="exportSubmenu">
            <button id="btn-export-all">⬇ Export All Teams</button>
            <button id="btn-export-assigned">⬇ Export Assigned Teams</button>
          </div>
        </div>

        <button id="btn-export-image">📸 Export Image</button>
      </div>
      <div class="toolbar-section">
        <span class="toolbar-label">Edit</span>
        <button id="btn-copy">📋 Copy Day</button>
        <button id="btn-undo">↩ Undo</button>
        <button id="btn-multi">🧩 Multi</button>
        <button id="btn-clear-desks">🧽 Clear Desks</button>
        <button id="btn-clear-all">🧹 Clear All</button>
        <button id="btn-reset" class="btn-danger">🗑 Reset</button>
      </div>
      <div class="toolbar-section" style="border-top:none;padding-top:0;">
        <button id="btn-help">❓ Help</button>
      </div>

      <!-- Editable category label -->
      <div id="categoryHeaderWrap" class="category-header-wrap">
        <span class="category-label-group">
          <span id="categoryLabel" class="section-header category-label-text" title="Click to rename">Teams</span>
          <button id="btn-edit-category" class="category-edit-btn" title="Rename category">✏️</button>
        </span>
      </div>
      <div id="categoryEditWrap" class="category-edit-wrap" style="display:none;">
        <input id="categoryInput" type="text" class="category-input" value="Teams" autocomplete="off" spellcheck="false">
        <button id="btn-category-save" class="category-save-btn">✓</button>
        <button id="btn-category-cancel" class="category-cancel-btn">✕</button>
      </div>

      <div id="legend"></div>

      <div class="summary-wrap">
        <div class="summary-header">
          <span class="section-header" style="margin:0;">Desk Allocation Summary</span>
          <button id="btn-toggle-summary" class="summary-toggle-btn" title="Hide summary">▲</button>
        </div>
        <div id="summary"></div>
      </div>
    </div>
  </div>

  <!-- Shared modal backdrop -->
  <div id="modalBackdrop" class="modal-backdrop"></div>

  <!-- uiPrompt modal — replaces browser prompt() -->
  <div id="uiPromptModal" class="ui-modal" role="dialog" aria-modal="true" style="display:none">
    <h3 id="uiPromptTitle" class="ui-modal-title"></h3>
    <div class="ui-modal-body">
      <label id="uiPromptLabel" class="ui-modal-label"></label>
      <input id="uiPromptInput" type="text" class="ui-modal-input" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-actions">
      <button id="uiPromptConfirm">OK</button>
      <button id="uiPromptCancel" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <!-- uiConfirm modal — replaces browser confirm() -->
  <div id="uiConfirmModal" class="ui-modal" role="dialog" aria-modal="true" style="display:none">
    <h3 id="uiConfirmTitle" class="ui-modal-title"></h3>
    <p  id="uiConfirmMsg"   class="ui-modal-msg"></p>
    <div class="modal-actions">
      <button id="uiConfirmConfirm">OK</button>
      <button id="uiConfirmCancel" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <!-- Copy modal -->
  <div id="copyModal" role="dialog" aria-modal="true">
    <h3>Copy Day To…</h3>
    <div id="copyDays"></div>
    <div class="modal-actions">
      <button id="btn-apply-copy">Apply</button>
      <button id="btn-cancel-copy" class="btn-danger">Cancel</button>
    </div>
  </div>

  <!-- Team edit modal -->
  <div id="teamEditModal" role="dialog" aria-modal="true">
    <div id="teamEditPanel">
      <div class="team-edit-header">
        <span class="team-edit-dot" id="teamEditDot"></span>
        <h3 id="teamEditTitle">Edit Team</h3>
      </div>
      <div class="team-edit-body">
        <label for="teamEditInput">Name</label>
        <input id="teamEditInput" type="text" autocomplete="off" spellcheck="false">
      </div>
      <div class="modal-actions">
        <button id="btn-team-edit-save">Save</button>
        <button id="btn-team-edit-delete" class="btn-danger">Delete</button>
        <button id="btn-team-edit-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
    <div id="teamDeletePanel" style="display:none">
      <div class="team-edit-header">
        <span class="team-edit-dot" id="teamDeleteDot"></span>
        <h3 id="teamDeleteTitle">Delete Team?</h3>
      </div>
      <p id="teamDeleteMsg" style="margin:0 0 16px;font-size:13px;color:var(--text-muted);line-height:1.5;"></p>
      <div class="modal-actions" style="flex-wrap:wrap;">
        <button id="btn-dc-unassign" class="btn-danger">Delete &amp; Unassign</button>
        <button id="btn-dc-keep">Delete, Keep Colours</button>
        <button id="btn-dc-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Floor plan loading overlay -->
  <div id="floorLoading" class="floor-loading" style="display:none">
    <div class="floor-loading-inner">
      <div class="floor-loading-spinner"></div>
      <span id="floorLoadingLabel">Loading floor plan…</span>
    </div>
  </div>

  <!-- Map area -->
  <div class="map-area">

    <!-- Zoom controls (single view only) -->
    <div id="zoomControls" class="zoom-controls">
      <button id="btn-zoom-in"    class="zoom-btn" title="Zoom in">＋</button>
      <button id="btn-zoom-out"   class="zoom-btn" title="Zoom out">－</button>
      <span   id="zoomLabel"      class="zoom-label">100%</span>
      <button id="btn-zoom-reset" class="zoom-btn zoom-reset" title="Reset zoom" style="display:none">⤢ Fit</button>
    </div>

    <!-- Viewport clips overflow; mapBox scales inside it -->
    <div id="mapViewport" class="map-viewport">
      <div id="mapSingle" class="mapBox">
        <img id="floorPlanImg" src="" alt="Office floor plan">
        <div id="svgContainer" class="svgLayer"></div>
      </div>
    </div>

    <div id="compareWrap">
      <div class="compare-panel">
        <div class="compare-label" id="compareLabel1"></div>
        <div class="mapBox">
          <img id="floorPlanImg1" src="" alt="Floor plan day 1">
          <div id="svgContainer1" class="svgLayer"></div>
        </div>
      </div>
      <div class="compare-panel">
        <div class="compare-label" id="compareLabel2"></div>
        <div class="mapBox">
          <img id="floorPlanImg2" src="" alt="Floor plan day 2">
          <div id="svgContainer2" class="svgLayer"></div>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".csv" style="display:none" aria-hidden="true">

  <script type="module" src="app.js"></script>
</body>
</html>
